openapi: 3.0.3

info:
  title: WMS API
  version: 1.0.0

paths:
  /products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        "404":
          description: Product not found

  /orders:
    post:
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        "201":
          description: Order created
        "400":
          description: Invalid request
        "409":
          description: Insufficient stock

  /orders/{id}:
    get:
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        "404":
          description: Order not found

  /orders/{id}/status:
    patch:
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        "200":
          description: Status updated
        "400":
          description: Invalid request
        "404":
          description: Order not found

components:
  schemas:
    ProductResponse:
      type: object
      required:
        - id
        - name
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateOrderRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        comment:
          type: string

    UpdateOrderStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string

    OrderItemResponse:
      type: object
      required:
        - id
        - orderId
        - productId
        - quantity
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        quantity:
          type: integer

    OrderResponse:
      type: object
      required:
        - id
        - status
        - createdAt
      properties:
        id:
          type: integer
        status:
          type: string
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemResponse'